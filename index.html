<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yapılacaklar</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    /* ── Auth pages ── */
    .auth-wrap {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    .auth-header {
      background: linear-gradient(135deg, #6c63ff 0%, #48c6ef 100%);
      padding: 36px 32px 28px;
      text-align: center;
    }
    .auth-header .icon { font-size: 44px; margin-bottom: 10px; }
    .auth-header h1 { color: #fff; font-size: 22px; font-weight: 700; }
    .auth-header p  { color: rgba(255,255,255,0.85); font-size: 14px; margin-top: 6px; }

    .auth-body { padding: 32px; }

    .tab-row {
      display: flex;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab-row button {
      flex: 1;
      padding: 10px;
      border: none;
      background: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      color: #888;
      font-weight: 500;
      transition: all 0.2s;
    }
    .tab-row button.active {
      background: #6c63ff;
      color: #fff;
      font-weight: 600;
    }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #6c63ff; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6c63ff, #48c6ef);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover   { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
    }
    .msg.error   { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; display: block; }
    .msg.success { background: #f0fff4; color: #27ae60; border: 1px solid #c3e6cb; display: block; }

    /* ── Confirm page ── */
    .confirm-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      overflow: hidden;
      text-align: center;
    }
    .confirm-header {
      background: linear-gradient(135deg, #6c63ff 0%, #48c6ef 100%);
      padding: 40px 32px;
    }
    .confirm-header .big-icon { font-size: 64px; }
    .confirm-header h1 { color: #fff; font-size: 22px; margin-top: 12px; }
    .confirm-body { padding: 32px; }
    .confirm-body p { color: #555; font-size: 15px; line-height: 1.7; margin-bottom: 24px; }
    .btn-outline {
      display: inline-block;
      padding: 12px 32px;
      border: 2px solid #6c63ff;
      border-radius: 10px;
      color: #6c63ff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: #6c63ff; color: #fff; }

    /* ── Todo app ── */
    .app-wrap {
      width: 100%;
      max-width: 500px;
    }

    .app-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .app-topbar .user-info { font-size: 0.82rem; color: #888; }
    .app-topbar .user-info strong { color: #555; }
    .logout-btn {
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }

    .app-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px;
    }
    .app-card h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 24px; }

    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #6c63ff; }
    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover    { background: #574fd6; }
    .input-row button:disabled { background: #aaa; cursor: not-allowed; }

    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }
    .filters button.active { border-color: #6c63ff; color: #6c63ff; font-weight: 600; }

    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    li:hover { background: #f7f7ff; }
    li + li { border-top: 1px solid #f0f0f0; }
    li input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #6c63ff;
      cursor: pointer; flex-shrink: 0;
    }
    li span { flex: 1; font-size: 0.95rem; color: #333; word-break: break-word; }
    li.done span { text-decoration: line-through; color: #aaa; }
    li .del-btn {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 1.1rem;
      padding: 2px 6px; border-radius: 4px;
      transition: color 0.2s;
    }
    li .del-btn:hover { color: #e74c3c; }

    .empty { text-align: center; color: #bbb; font-size: 0.9rem; padding: 24px 0; }
    .loader { text-align: center; color: #bbb; font-size: 0.9rem; padding: 24px 0; }

    .todo-footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #aaa;
    }
    .todo-footer button {
      background: none; border: none;
      cursor: pointer; color: #e74c3c;
      font-size: 0.82rem;
    }
    .todo-footer button:hover { text-decoration: underline; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Auth page -->
  <div class="auth-wrap" id="authPage">
    <div class="auth-card">
      <div class="auth-header">
        <div class="icon">✅</div>
        <h1>Yapılacaklar</h1>
        <p>Görevlerini organize et, hedeflerine ulaş</p>
      </div>
      <div class="auth-body">
        <div class="tab-row">
          <button class="active" onclick="switchTab('login')">Giriş Yap</button>
          <button onclick="switchTab('register')">Kayıt Ol</button>
        </div>
        <div id="authMsg" class="msg"></div>

        <!-- Login form -->
        <div id="loginForm">
          <div class="form-group">
            <label>E-posta</label>
            <input type="email" id="loginEmail" placeholder="ornek@eposta.com">
          </div>
          <div class="form-group">
            <label>Şifre</label>
            <input type="password" id="loginPass" placeholder="••••••••">
          </div>
          <button class="btn-primary" id="loginBtn" onclick="login()">Giriş Yap</button>
        </div>

        <!-- Register form -->
        <div id="registerForm" class="hidden">
          <div class="form-group">
            <label>E-posta</label>
            <input type="email" id="regEmail" placeholder="ornek@eposta.com">
          </div>
          <div class="form-group">
            <label>Şifre <span style="color:#aaa;font-weight:400">(en az 6 karakter)</span></label>
            <input type="password" id="regPass" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Şifre Tekrar</label>
            <input type="password" id="regPass2" placeholder="••••••••">
          </div>
          <button class="btn-primary" id="registerBtn" onclick="register()">Kayıt Ol</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Email confirmed success page -->
  <div class="auth-wrap hidden" id="confirmedPage">
    <div class="confirm-card">
      <div class="confirm-header">
        <div class="big-icon">🎉</div>
        <h1>E-posta Doğrulandı!</h1>
      </div>
      <div class="confirm-body">
        <p>Harika! E-posta adresiniz başarıyla doğrulandı.<br>Artık uygulamaya giriş yapabilirsiniz.</p>
        <button class="btn-outline" onclick="goToLogin()">Giriş Yap</button>
      </div>
    </div>
  </div>

  <!-- Todo app -->
  <div class="app-wrap hidden" id="appPage">
    <div class="app-topbar">
      <div class="user-info">Merhaba, <strong id="userEmail">—</strong></div>
      <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </div>
    <div class="app-card">
      <h1>Yapılacaklar</h1>
      <div id="appMsg" class="msg"></div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120">
        <button id="addBtn" onclick="addTodo()">Ekle</button>
      </div>

      <div class="filters">
        <button class="active" onclick="setFilter('all',this)">Tümü</button>
        <button onclick="setFilter('active',this)">Aktif</button>
        <button onclick="setFilter('done',this)">Tamamlanan</button>
      </div>

      <ul id="todoList"><div class="loader">Yükleniyor...</div></ul>

      <div class="todo-footer">
        <span id="countLabel"></span>
        <button onclick="clearDone()">Tamamlananları sil</button>
      </div>
    </div>
  </div>

  <script>
    /* ── Config ── */
    const SB_URL  = 'https://rqojwgezzafsrmfvwwxj.supabase.co';
    const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxb2p3Z2V6emFmc3JtZnZ3d3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTU2NDgsImV4cCI6MjA5MjM3MTY0OH0.c55FzHX8Tkl2hPqVwHT17EIwqAZI2-_D0bkshagqQ1A';

    let session = null;
    let filter  = 'all';

    /* ── Auth helpers ── */
    async function authFetch(path, opts = {}) {
      const res = await fetch(`${SB_URL}/auth/v1${path}`, {
        ...opts,
        headers: {
          'apikey': SB_ANON,
          'Content-Type': 'application/json',
          ...(opts.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error_description || data.msg || data.error || `HTTP ${res.status}`);
      return data;
    }

    async function apiFetch(path, opts = {}) {
      const res = await fetch(`${SB_URL}/rest/v1${path}`, {
        ...opts,
        headers: {
          'apikey': SB_ANON,
          'Authorization': `Bearer ${session.access_token}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation',
          ...(opts.headers || {})
        }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    /* ── Page routing ── */
    function show(pageId) {
      ['authPage','confirmedPage','appPage'].forEach(id =>
        document.getElementById(id).classList.toggle('hidden', id !== pageId)
      );
    }

    function goToLogin() {
      clearHash();
      show('authPage');
      switchTab('login');
    }

    function clearHash() {
      history.replaceState(null, '', window.location.pathname);
    }

    /* ── Handle confirmation redirect ── */
    function handleRedirect() {
      const hash   = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const type   = params.get('type');
      const token  = params.get('access_token');

      if (type === 'signup' && token) {
        show('confirmedPage');
        clearHash();
        return true;
      }
      if (token) {
        session = {
          access_token:  token,
          refresh_token: params.get('refresh_token')
        };
        localStorage.setItem('sb_session', JSON.stringify(session));
        clearHash();
        showApp();
        return true;
      }
      return false;
    }

    /* ── Tabs ── */
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
      document.getElementById('registerForm').classList.toggle('hidden', isLogin);
      document.querySelectorAll('.tab-row button').forEach((b, i) =>
        b.classList.toggle('active', isLogin ? i === 0 : i === 1)
      );
      clearMsg('authMsg');
    }

    function showMsg(id, text, type = 'error') {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `msg ${type}`;
    }
    function clearMsg(id) {
      const el = document.getElementById(id);
      el.className = 'msg';
      el.textContent = '';
    }

    /* ── Auth actions ── */
    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass  = document.getElementById('loginPass').value;
      if (!email || !pass) return showMsg('authMsg', 'Lütfen tüm alanları doldurun.');
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Giriş yapılıyor...';
      try {
        const data = await authFetch('/token?grant_type=password', {
          method: 'POST',
          body: JSON.stringify({ email, password: pass })
        });
        session = data;
        localStorage.setItem('sb_session', JSON.stringify(session));
        showApp();
      } catch (e) {
        showMsg('authMsg', 'Giriş başarısız: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Giriş Yap';
      }
    }

    async function register() {
      const email = document.getElementById('regEmail').value.trim();
      const pass  = document.getElementById('regPass').value;
      const pass2 = document.getElementById('regPass2').value;
      if (!email || !pass || !pass2) return showMsg('authMsg', 'Lütfen tüm alanları doldurun.');
      if (pass !== pass2)            return showMsg('authMsg', 'Şifreler eşleşmiyor.');
      if (pass.length < 6)           return showMsg('authMsg', 'Şifre en az 6 karakter olmalıdır.');
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Kayıt olunuyor...';
      try {
        const redirectTo = encodeURIComponent('https://selcukgunal.github.io/todo-app/');
        await authFetch(`/signup?redirect_to=${redirectTo}`, {
          method: 'POST',
          body: JSON.stringify({ email, password: pass })
        });
        showMsg('authMsg',
          '📧 Doğrulama e-postası gönderildi! Lütfen gelen kutunuzu kontrol edin ve linke tıklayarak hesabınızı onaylayın.',
          'success'
        );
        document.getElementById('regEmail').value = '';
        document.getElementById('regPass').value  = '';
        document.getElementById('regPass2').value = '';
      } catch (e) {
        showMsg('authMsg', 'Kayıt başarısız: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = 'Kayıt Ol';
      }
    }

    async function logout() {
      try {
        await authFetch('/logout', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${session?.access_token}` }
        });
      } catch {}
      session = null;
      localStorage.removeItem('sb_session');
      show('authPage');
      switchTab('login');
    }

    /* ── App ── */
    function showApp() {
      show('appPage');
      document.getElementById('userEmail').textContent = parseJwt(session.access_token)?.email || '—';
      loadTodos();
    }

    function parseJwt(token) {
      try { return JSON.parse(atob(token.split('.')[1])); } catch { return {}; }
    }

    /* ── Todo CRUD ── */
    async function loadTodos() {
      try {
        let path = '/todos?order=created_at.asc';
        if (filter === 'active') path += '&done=eq.false';
        if (filter === 'done')   path += '&done=eq.true';
        const [todos, all] = await Promise.all([apiFetch(path), apiFetch('/todos?select=done')]);
        renderList(todos);
        document.getElementById('countLabel').textContent =
          `${all.filter(t => !t.done).length} görev kaldı`;
      } catch (e) {
        showMsg('appMsg', 'Yükleme hatası: ' + e.message);
        document.getElementById('todoList').innerHTML = '<p class="empty">Yükleme hatası</p>';
      }
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text  = input.value.trim();
      if (!text) return;
      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      try {
        await apiFetch('/todos', {
          method: 'POST',
          body: JSON.stringify({ text, done: false, user_id: parseJwt(session.access_token).sub })
        });
        input.value = '';
        await loadTodos();
      } catch (e) {
        showMsg('appMsg', 'Eklenemedi: ' + e.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function toggleTodo(id, currentDone) {
      try {
        await apiFetch(`/todos?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ done: !currentDone })
        });
        await loadTodos();
      } catch (e) {
        showMsg('appMsg', 'Güncellenemedi: ' + e.message);
      }
    }

    async function deleteTodo(id) {
      try {
        await apiFetch(`/todos?id=eq.${id}`, { method: 'DELETE' });
        await loadTodos();
      } catch (e) {
        showMsg('appMsg', 'Silinemedi: ' + e.message);
      }
    }

    async function clearDone() {
      try {
        await apiFetch('/todos?done=eq.true', { method: 'DELETE' });
        await loadTodos();
      } catch (e) {
        showMsg('appMsg', 'Temizlenemedi: ' + e.message);
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadTodos();
    }

    function renderList(todos) {
      const list = document.getElementById('todoList');
      list.innerHTML = '';
      if (!todos.length) {
        list.innerHTML = '<p class="empty">Görev yok</p>';
        return;
      }
      todos.forEach(t => {
        const li = document.createElement('li');
        if (t.done) li.classList.add('done');
        li.innerHTML = `
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTodo(${t.id},${t.done})">
          <span>${esc(t.text)}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})" title="Sil">&#x2715;</button>
        `;
        list.appendChild(li);
      });
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Init ── */
    (function init() {
      if (handleRedirect()) return;

      const saved = localStorage.getItem('sb_session');
      if (saved) {
        try {
          session = JSON.parse(saved);
          const payload = parseJwt(session.access_token);
          if (payload.exp * 1000 > Date.now()) {
            showApp();
            return;
          }
        } catch {}
        localStorage.removeItem('sb_session');
      }
      show('authPage');
    })();
  </script>
</body>
</html>
