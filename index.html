<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 24px; }

    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #6c63ff; }

    .input-row button {
      padding: 10px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #574fd6; }
    .input-row button:disabled { background: #aaa; cursor: not-allowed; }

    .filters { display: flex; gap: 8px; margin-bottom: 16px; }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }
    .filters button.active { border-color: #6c63ff; color: #6c63ff; font-weight: 600; }

    ul { list-style: none; }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 8px;
      transition: background 0.15s;
    }
    li:hover { background: #f7f7ff; }
    li + li { border-top: 1px solid #f0f0f0; }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span { flex: 1; font-size: 0.95rem; color: #333; word-break: break-word; }
    li.done span { text-decoration: line-through; color: #aaa; }

    li .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    li .delete-btn:hover { color: #e74c3c; }

    .empty { text-align: center; color: #bbb; font-size: 0.9rem; padding: 24px 0; }

    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #aaa;
    }
    .footer button {
      background: none;
      border: none;
      cursor: pointer;
      color: #e74c3c;
      font-size: 0.82rem;
    }
    .footer button:hover { text-decoration: underline; }

    .loader { text-align: center; padding: 24px 0; color: #aaa; font-size: 0.9rem; }

    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>
    <div class="error-msg" id="errorMsg"></div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." maxlength="120">
      <button id="addBtn" onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul id="todoList"><div class="loader">Yükleniyor...</div></ul>

    <div class="footer">
      <span id="countLabel"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL  = 'https://rqojwgezzafsrmfvwwxj.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxb2p3Z2V6emFmc3JtZnZ3d3hqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTU2NDgsImV4cCI6MjA5MjM3MTY0OH0.c55FzHX8Tkl2hPqVwHT17EIwqAZI2-_D0bkshagqQ1A';

    const BASE_HEADERS = {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let filter = 'all';

    const input   = document.getElementById('todoInput');
    const addBtn  = document.getElementById('addBtn');
    const list    = document.getElementById('todoList');
    const countLb = document.getElementById('countLabel');
    const errorEl = document.getElementById('errorMsg');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
        ...options,
        headers: { ...BASE_HEADERS, ...(options.headers || {}) }
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      setTimeout(() => { errorEl.style.display = 'none'; }, 4000);
    }

    async function loadTodos() {
      try {
        let path = '/todos?order=created_at.asc';
        if (filter === 'active') path += '&done=eq.false';
        if (filter === 'done')   path += '&done=eq.true';

        const [todos, all] = await Promise.all([
          api(path),
          api('/todos?select=done')
        ]);

        renderList(todos);
        countLb.textContent = `${all.filter(t => !t.done).length} görev kaldı`;
      } catch (e) {
        showError('Yükleme hatası: ' + e.message);
        list.innerHTML = '<p class="empty">Yükleme hatası</p>';
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      addBtn.disabled = true;
      try {
        await api('/todos', {
          method: 'POST',
          body: JSON.stringify({ text, done: false })
        });
        input.value = '';
        await loadTodos();
      } catch (e) {
        showError('Eklenemedi: ' + e.message);
      } finally {
        addBtn.disabled = false;
      }
    }

    async function toggleTodo(id, currentDone) {
      try {
        await api(`/todos?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ done: !currentDone })
        });
        await loadTodos();
      } catch (e) {
        showError('Güncellenemedi: ' + e.message);
      }
    }

    async function deleteTodo(id) {
      try {
        await api(`/todos?id=eq.${id}`, { method: 'DELETE' });
        await loadTodos();
      } catch (e) {
        showError('Silinemedi: ' + e.message);
      }
    }

    async function clearDone() {
      try {
        await api('/todos?done=eq.true', { method: 'DELETE' });
        await loadTodos();
      } catch (e) {
        showError('Temizlenemedi: ' + e.message);
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadTodos();
    }

    function renderList(todos) {
      list.innerHTML = '';
      if (todos.length === 0) {
        list.innerHTML = '<p class="empty">Görev yok</p>';
        return;
      }
      todos.forEach(todo => {
        const li = document.createElement('li');
        if (todo.done) li.classList.add('done');
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} onchange="toggleTodo(${todo.id}, ${todo.done})">
          <span>${escHtml(todo.text)}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})" title="Sil">&#x2715;</button>
        `;
        list.appendChild(li);
      });
    }

    function escHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadTodos();
  </script>
</body>
</html>
